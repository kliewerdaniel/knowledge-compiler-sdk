id: pass-10-software
name: Software Generation
produces: application-ir
consumes: [application-ir, reasoning-ir, semantic-ir]
downstream: []
entrypoint: run.py
deterministic: true
model_required: false
description: >-
  Read the Application IR (produced by pass-09) and emit a runnable Next.js
  scaffold (pages, components, API routes serving the compiled data, an SVG
  knowledge-graph viewer) under build/app/. Deterministic code generation; no
  model call. Validation/repair backfills a valid scaffold if sections are
  missing.
